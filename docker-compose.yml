services:
  cam:
    build: .
    ports:
      - "9222:9222"
    volumes:
      - cam-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ${WORKSPACE_ROOT:-/c/Users/chris/Projects}:/workspaces:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4173:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:9222
    depends_on:
      - cam
    restart: unless-stopped

volumes:
  cam-data:
